name: E2E (Maestro)

on:
  workflow_dispatch:  # 手動実行のみ。GitHubのActionsタブから「Run workflow」で発火

jobs:
  # ===== Light E2E: UI操作のみ (dummy API keysでCI実行可) =====
  light:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}
          restore-keys: gradle-

      - name: Create local.properties
        run: |
          echo "groq.api.key=dummy_key_for_ci" > local.properties
          echo "gemini.api.key=dummy_key_for_ci" >> local.properties
          echo "sdk.dir=$ANDROID_HOME" >> local.properties

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -l /dev/kvm || echo "KVM not available"

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api31-x86-v3

      - name: Create AVD and generate snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          target: default
          ram-size: 2048M
          heap-size: 256M
          disk-size: 6000M
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save -memory 2048
          disable-animations: true
          emulator-boot-timeout: 1200
          script: echo "AVD snapshot generated"

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Run Light E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          arch: x86_64
          target: default
          ram-size: 2048M
          heap-size: 256M
          disk-size: 6000M
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot-save -memory 2048
          disable-animations: true
          emulator-boot-timeout: 1200
          script: |
            # APKインストール
            adb install -r app/build/outputs/apk/debug/app-debug.apk

            # 音声録音権限付与
            adb shell pm grant com.kohei.summaryrecorder android.permission.RECORD_AUDIO
            adb shell pm grant com.kohei.summaryrecorder android.permission.POST_NOTIFICATIONS

            # Light E2E実行 (UI操作のみ, API呼び出しなし)
            maestro test .maestro/e2e_happy_path.yaml --format junit
            maestro test .maestro/e2e_settings.yaml --format junit

      - name: Upload Maestro report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-light-report
          path: ~/.maestro/tests/**/*

# ===== Heavy E2E: フルパイプライン (手動実行, 実際のAPI keys必要) =====
#
# Heavy E2EはCIでは実行しません。手動で実行してください:
#
#   前提:
#     1. 実機またはエミュレータが接続済み
#     2. local.properties に実際のAPI keysが設定済み
#     3. Maestroがインストール済み (curl -Ls "https://get.maestro.mobile.dev" | bash)
#
#   実行手順:
#     ./e2e/setup_heavy.sh          # DB + WAV事前投入
#     maestro test .maestro/e2e_heavy_pipeline.yaml
#
#   または一括実行:
#     ./e2e/run_heavy.sh
