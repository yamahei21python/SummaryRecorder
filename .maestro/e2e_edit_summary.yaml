appId: com.kohei.summaryrecorder
---
# Edit E2E: 要約タイトル編集フロー
# 前提: 要約カードが1件以上存在すること (heavy_pipeline完了後に実行推奨)

# アプリ起動
- launchApp: com.kohei.summaryrecorder

# Tab 3 (要約) を開く
- tapOn: "要約"

# カードが存在することを確認
- assertNotVisible: "録音がありません"

# カードをタップして詳細画面へ
- tapOn:
    text: "\\d{4}/\\d{2}/\\d{2}.*"
    index: 0

# 詳細画面の要素確認
- assertVisible: "←"
- assertVisible: "✏編集"

# 編集ボタンをタップ
- tapOn: "✏編集"

# 編集ダイアログ確認
- assertVisible: "タイトル編集"
- assertVisible: "タイトル"
- assertVisible: "保存"
- assertVisible: "キャンセル"

# テキストフィールドをクリアして新しいタイトル入力
# 現在のタイトルテキストをタップ → 全消し → 入力
- tapOn: "関東地方の天気予報"
- eraseText: 30
- inputText: "E2E Edit Test"

# 保存
- tapOn: "保存"

# ダイアログ閉じたことを確認
- assertNotVisible: "タイトル編集"

# 戻る
- tapOn: "←"

# カードに戻り、編集後のタイトルが表示されることを確認
- assertVisible: "E2E Edit Test"
