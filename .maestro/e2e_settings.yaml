appId: com.kohei.summaryrecorder
---
# Settings E2E: 設定ダイアログUI確認（ファイル選択はシステムUIのためスキップ）

# アプリ起動
- launchApp

# ===== Tab 0 (録音): ⚙設定ボタン存在確認 =====
- assertVisible: "⚙"

# ===== 設定ダイアログ表示 =====
- tapOn: "⚙"
- assertVisible: "設定"
- assertVisible: "エクスポート"
- assertVisible: "インポート"
- assertVisible: "閉じる"

# ===== 閉じるでダイアログを閉じる =====
- tapOn: "閉じる"
- assertNotVisible: "設定"

# ===== 再度開く =====
- tapOn: "⚙"
- assertVisible: "設定"

# ===== インポート→確認ダイアログ =====
- tapOn: "インポート"
- assertVisible: "インポート"
- assertVisible: "既存データと重複する場合は上書きされます。続行しますか？"
- assertVisible: "キャンセル"

# ===== キャンセル =====
- tapOn: "キャンセル"
- assertNotVisible: "インポート"
