appId: com.kohei.summaryrecorder
---
# Heavy E2E: Groq転写 → Gemini要約 フルパイプライン (手動実行, 実際のAPI keys必要)
# 前提: ./e2e/setup_heavy.sh を先に実行してDB + WAVファイルを事前投入済み
# 前提: ./e2e/setup_heavy.sh がbroadcast済み (パイプライン完了後にこのflowを実行)

# アプリ起動
- launchApp: com.kohei.summaryrecorder

# Tab 2 (要約) を開く
- tapOn: "要約"

# 要約完了まで最大180秒リトライ (Groq + Gemini)
- retry:
    maxRetries: 90
    commands:
      - assertNotVisible: "録音がありません"

# 要約カードが表示された — カード内の日付テキストをタップ
# (setup_heavy完了後はDONEカード1件のみ存在)
- tapOn:
    text: "\\d{4}/\\d{2}/\\d{2}.*"
    index: 0

# 詳細画面確認
- assertVisible: "←"
- assertVisible: "✏編集"
- assertVisible: "要約"
- assertVisible: "読みおこし"

# 読みおこしタブ
- tapOn: "読みおこし"

# 戻る
- tapOn: "←"
