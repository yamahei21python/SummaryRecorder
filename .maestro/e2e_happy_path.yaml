appId: com.kohei.summaryrecorder
---
# Light E2E: 録音→停止UI操作 (CI実行可, API不要)

# アプリ起動
- launchApp

# ===== 起動直後: Tab 0 (録音操作) =====
- assertVisible: "● 録音"
- assertVisible: "□ 停止"

# ===== 録音開始 =====
- tapOn: "● 録音"

# 録音中のUI確認
- assertVisible: "‖ 一時停止"

# ===== 一時停止 =====
- tapOn: "‖ 一時停止"
- assertVisible: "▶ 再開"

# ===== 再開 =====
- tapOn: "▶ 再開"
- assertVisible: "‖ 一時停止"

# ===== 録音停止 =====
- tapOn: "□ 停止"

# ===== Tab 2 (要約) 切り替え =====
- tapOn: "要約"

# ===== Tab 1 (音声確認) 切り替え =====
- tapOn: "音声確認"
