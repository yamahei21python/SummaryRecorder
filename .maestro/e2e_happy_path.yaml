appId: com.kohei.summaryrecorder
---
# E2E Happy Path

- assertVisible: "録音開始"

# 録音開始
- tapOn: "録音開始"

# チャンク完了待ち
- assertVisible: "チャンク状態"
- assertVisible: "完了"

# 録音停止
- tapOn: "録音停止"

# 要約結果が表示されるまで最大60秒リトライ
- retry:
    maxRetries: 30
    commands:
      - assertVisible: "要約結果"

# 履歴タブ
- tapOn: "履歴"

# 自動削除確認
- assertVisible: "履歴がありません"